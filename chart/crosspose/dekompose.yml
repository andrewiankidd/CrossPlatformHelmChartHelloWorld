custom-rules:
  - match: cross-platform-hello

    windows-workloads:
      - hello-windows

    infra:
      # ── MSSQL Server ──────────────────────────────────────────────────────
      - name: mssql
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
          - "1433:1433"
        environment:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "P@ssw0rd!123"
          MSSQL_PID: Developer
        healthcheck:
          test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "P@ssw0rd!123" -C -Q "SELECT 1" -b
          interval: 10s
          timeout: 5s
          retries: 10
          start_period: 30s

      # ── Azure Service Bus Emulator ─────────────────────────────────────────
      - name: azureservicebusemulator
        image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
        ports:
          - "5672:5672"
          - "9354:9354"
        environment:
          ACCEPT_EULA: "Y"
          SQL_SERVER: mssql
        depends_on:
          mssql:
            condition: service_healthy

      # ── Azurite (Azure Storage Emulator) ───────────────────────────────────
      - name: azurestorageemulator
        image: mcr.microsoft.com/azure-storage/azurite:latest
        ports:
          - "10000:10000"
          - "10001:10001"
          - "10002:10002"
        command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
        environment:
          AZURITE_ACCOUNTS: "devstoreaccount1:QXpMb2NhbERldktleTEyMyE="
